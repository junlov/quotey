[database]
url = "sqlite://quotey.db"
max_connections = 5
timeout_secs = 30

[slack]
app_token = "${SLACK_APP_TOKEN}"
bot_token = "${SLACK_BOT_TOKEN}"

[llm]
provider = "ollama"
base_url = "http://localhost:11434"
model = "llama3.1"
timeout_secs = 30
max_retries = 2

[server]
bind_address = "127.0.0.1"
health_check_port = 8080
graceful_shutdown_secs = 15

[logging]
level = "info"
format = "compact"

[crm]
enabled = false
callback_base_url = "https://crm.example.internal"
# salesforce_client_id = "..."
# salesforce_client_secret = "..."
# hubspot_client_id = "..."
# hubspot_client_secret = "..."
# webhook_secret = "..."

[mcp.auth]
enabled = false
rate_limit_window_secs = 60

[[mcp.auth.api_keys]]
key = "${MCP_API_KEY}"
name = "agent-default"
requests_per_minute = 60
